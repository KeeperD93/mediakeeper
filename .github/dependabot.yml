version: 2

# Dependabot automatic dependency updates — MediaKeeper.
# Groups patch + minor updates into weekly PRs to reduce noise.
# Major bumps come in separate PRs (human review needed).
# Major bumps for frameworks scheduled for the post-1.0 frontend roadmap
# are ignored explicitly to keep the PR queue actionable.

updates:
  # Frontend — npm
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      frontend-patch:
        update-types: ["patch"]
      frontend-minor:
        update-types: ["minor"]
    ignore:
      # Held back for the post-1.0 frontend modernization wave.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vue-i18n"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@tiptap/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  # Backend — pip
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      backend-patch:
        update-types: ["patch"]
      backend-minor:
        update-types: ["minor"]
    ignore:
      # Major bumps deferred to a dedicated batch (psutil 5 -> 7,
      # chardet 5 -> 7) — runtime profile + character detection
      # changes need their own validation cycle.
      - dependency-name: "psutil"
        update-types: ["version-update:semver-major"]
      - dependency-name: "chardet"
        update-types: ["version-update:semver-major"]

  # Docker base images (multi-stage: node:20-alpine + python:3.12-slim)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      docker-patch:
        update-types: ["patch"]
      docker-minor:
        update-types: ["minor"]

  # GitHub Actions themselves
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(ci)"
