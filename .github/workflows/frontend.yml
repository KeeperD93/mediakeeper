name: Frontend — lint, typecheck, test, build

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

# Cancel outdated runs on the same branch (save CI minutes).
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint + typecheck + tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Stylelint (advisory)
        # Stylelint is currently advisory: a 3398-error baseline (mostly
        # rgba->rgb alias notation) predates the workflow's first run.
        # The cleanup is scheduled in a dedicated dette PR; until then
        # the step surfaces findings without blocking unrelated PRs.
        continue-on-error: true
        run: npm run stylelint

      - name: Prettier (check only)
        run: npm run format:check

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm run test:unit

      - name: Build
        run: npm run build
