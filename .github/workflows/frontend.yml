name: Frontend — lint, typecheck, test, build

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

# Cancel outdated runs on the same branch (save CI minutes).
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint + typecheck + tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: i18n locale parity + placeholders
        run: npm run i18n:check

      - name: ESLint
        run: npm run lint

      - name: Stylelint
        run: npm run stylelint

      - name: Prettier (changed source files)
        shell: bash
        run: |
          base_sha="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$base_sha" ] || ! git cat-file -e "$base_sha^{commit}" 2>/dev/null; then
            base_sha="HEAD~1"
          fi
          mapfile -t files < <(
            git diff --name-only --diff-filter=ACMR "$base_sha"...HEAD -- frontend/src \
            | awk '/\.(js|vue|css|json)$/ { sub("^frontend/", ""); print }'
          )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No changed frontend source files to format-check."
            exit 0
          fi
          npx prettier --check "${files[@]}"

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Unit tests + coverage (Vitest)
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

      - name: Build
        run: npm run build
