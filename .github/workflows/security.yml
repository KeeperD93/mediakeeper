name: Security — pip-audit + npm audit + bandit + ruff S + semgrep

on:
  push:
    branches: [main]
    paths:
      - 'backend/requirements.txt'
      - 'frontend/package-lock.json'
      - '.github/workflows/security.yml'
  pull_request:
    paths:
      - 'backend/requirements.txt'
      - 'frontend/package-lock.json'
      - '.github/workflows/security.yml'
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit (OSV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit (OSV vulnerability service)
        run: |
          pip-audit \
            --vulnerability-service osv \
            --requirement backend/requirements.txt \
            --strict

  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run npm audit (fail on high or critical)
        run: npm audit --omit=dev --audit-level=high

  bandit:
    name: bandit (medium+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install bandit
        run: python -m pip install --upgrade pip bandit

      - name: Run bandit
        run: bandit -r backend -ll -ii --exclude backend/tests

  ruff-security:
    name: ruff (S rules only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: Run ruff with security rules
        run: ruff check backend --select S --exclude backend/tests --output-format=github

  semgrep:
    name: semgrep (p/security-audit)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6

      - name: Run semgrep p/security-audit
        run: semgrep ci --config=p/security-audit --error
