name: Security — pip-audit + npm audit + bandit + ruff S + semgrep

on:
  push:
    branches: [main]
    paths:
      - 'backend/**/*.py'
      - 'backend/requirements.txt'
      - 'frontend/package-lock.json'
      - '.github/workflows/security.yml'
  pull_request:
    paths:
      - 'backend/**/*.py'
      - 'backend/requirements.txt'
      - 'frontend/package-lock.json'
      - '.github/workflows/security.yml'
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit (OSV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit (OSV vulnerability service)
        # PYSEC-2025-183 (CVE-2025-45768): disputed PyJWT advisory about
        # "weak encryption". The PyJWT maintainers reject the claim — key
        # strength is the caller's responsibility, not the library's. This
        # project already enforces a >= 32-byte JWT_SECRET_KEY for HS256 at
        # startup (see backend/core/security.py), so the report does not
        # apply. No fix version is published.
        run: |
          pip-audit \
            --vulnerability-service osv \
            --requirement backend/requirements.txt \
            --ignore-vuln PYSEC-2025-183 \
            --strict

  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run npm audit (fail on high or critical)
        run: npm audit --omit=dev --audit-level=high

  bandit:
    name: bandit (medium+, advisory)
    runs-on: ubuntu-latest
    # SAST findings are advisory: surfaced for review but do not block
    # the merge. Only HIGH/CRITICAL CVEs (pip-audit + npm audit) gate
    # the workflow. continue-on-error is set both at the job level
    # (workflow keeps going) and at the step level (the check itself
    # ends green in the PR UI even when findings exist).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install bandit
        run: python -m pip install --upgrade pip bandit

      - name: Run bandit
        continue-on-error: true
        run: bandit -r backend -ll -ii --exclude backend/tests

  ruff-security:
    name: ruff (S rules only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: Run ruff with security rules
        run: ruff check backend --select S --exclude backend/tests --output-format=github

  semgrep:
    name: semgrep (p/security-audit, advisory)
    runs-on: ubuntu-latest
    # SAST findings are advisory: surfaced for review but do not block.
    continue-on-error: true
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6

      - name: Run semgrep p/security-audit
        continue-on-error: true
        run: semgrep scan --config=p/security-audit --error --metrics=off backend
