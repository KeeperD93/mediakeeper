name: Validate PR title

# The squash-merge commit message is built from the PR title, but commitlint
# only checks the individual PR commits — never the title. Validate the title
# against the same Conventional Commits types as commitlint.config.js so a
# non-conforming title can't become a squash commit that breaks the
# changelog / history format.
on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Mirror commitlint.config.js type-enum exactly. Scope stays optional
          # (no scope-enum) and subject case is unrestricted (subject-case off,
          # so French subjects pass).
          types: |
            feat
            fix
            refactor
            perf
            docs
            style
            test
            build
            ci
            chore
            revert
          requireScope: false
