[pytest]
# MediaKeeper backend test config - single source of truth.
#
# Discovery works from both repo root (CI) and `backend/` (local dev,
# documented workflow). `cache_dir` keeps pytest scratch under backend/
# so the repo root stays clean.
#
# Coverage: run `pytest --cov` (or `pytest --cov --cov-report=html` for
# a browseable HTML report under `htmlcov/`). The CI gate enforces
# `--cov-fail-under=50` (baseline measured at 65%, 15-pt buffer).

addopts =
    --ignore-glob=backend/pytest-cache-files-*
    --ignore=backend/.pytest-temp

norecursedirs =
    .*
    __pycache__
    node_modules
    frontend
    frontend/dist
    backend/.pytest-temp
    backend/pytest-cache-files-*
    pytest-cache-files-*

# Route all test-side cache/temp output under backend/.pytest-temp so it
# doesn't pollute the repo root. Keeps the working tree clean.
cache_dir = backend/.pytest-temp/cache

# Be explicit about the async event loop management (avoids warnings).
asyncio_mode = auto
asyncio_default_test_loop_scope = function

[coverage:run]
source = backend
omit =
    backend/tests/*
    backend/alembic/*
    backend/**/__pycache__/*
    backend/logs/*

[coverage:report]
# Focus on actionable metrics — exclude defensive boilerplate.
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if __name__ == .__main__.:
    def __repr__
show_missing = True
skip_covered = False
precision = 1
