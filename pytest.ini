[pytest]
# MediaKeeper backend test config.
#
# Coverage: run `pytest --cov` (or `pytest --cov --cov-report=html` for
# a browseable HTML report under `htmlcov/`). Coverage config lives in
# the `[coverage:run]` / `[coverage:report]` blocks below.

addopts =
    --ignore-glob=backend/pytest-cache-files-*
    --ignore=backend/.pytest-temp

norecursedirs =
    .*
    __pycache__
    node_modules
    frontend
    frontend/dist
    backend/.pytest-temp
    backend/pytest-cache-files-*
    pytest-cache-files-*

# Route all test-side cache/temp output under backend/.pytest-temp so it
# doesn't pollute the repo root. Keeps the working tree clean.
cache_dir = backend/.pytest-temp/cache

# Be explicit about the async event loop management (avoids warnings).
asyncio_mode = auto

[coverage:run]
source = backend
omit =
    backend/tests/*
    backend/alembic/*
    backend/**/__pycache__/*
    backend/logs/*

[coverage:report]
# Focus on actionable metrics — exclude defensive boilerplate.
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if __name__ == .__main__.:
    def __repr__
show_missing = True
skip_covered = False
precision = 1
