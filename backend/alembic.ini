# Alembic configuration — Mediakeeper
# ============================================
# Usage:
#   cd backend
#   alembic upgrade head        # Apply every pending migration
#   alembic revision --autogenerate -m "description"
#   alembic downgrade -1        # Roll back the last migration
# ============================================

[alembic]
script_location = alembic
prepend_sys_path = .

# sqlalchemy.url is set dynamically in env.py
# (reads DATABASE_URL or /data/.pg_password)
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %Y-%m-%d %H:%M:%S
