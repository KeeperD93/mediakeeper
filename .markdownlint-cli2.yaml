# markdownlint-cli2 configuration. Rules are relaxed to match the
# project's existing hand-written docs on adoption; CHANGELOGs (auto-grown,
# tightly formatted) and generated files are excluded. Tighten over time.
config:
  default: true
  MD013: false # line length — prose lines intentionally run long
  MD033: false # inline HTML — used for badges and layout in READMEs
  MD041: false # first line need not be a top-level heading
  MD040: false # not every fenced block declares a language
  MD034: false # bare URLs tolerated in docs
  MD031: false # blank lines around fenced code not enforced
  MD009: false # trailing spaces tolerated (hard line breaks)
  MD060: false # table column alignment is cosmetic (and tool-version-specific)
  MD024:
    siblings_only: true # repeated headings allowed under different parents
gitignore: true
globs:
  - "**/*.md"
ignores:
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/CHANGELOG*.md"
  - "THIRD_PARTY_LICENSES.md"
